name: Lobster (OpenClaw Workflow Engine)
url: https://github.com/openclaw/lobster
description: Deterministic workflow runtime for OpenClaw. Enables multi-step pipelines
  with conditional logic, loops, and parallel execution inside an OpenClaw agent.
  Complements the LLM-driven sub-agent model with structured, predictable orchestration.
  Used for coding pipelines (programmer → reviewer → tester) and other deterministic
  multi-agent flows.
